name: 'Pull request policy checker'
description: 'Reject pull request if it does not comply specific policy'
inputs:
  python-version:
    description: 'Version of Python to use'
    required: false
    default: '3.12'
  restricted-words:
    description: "Comma-separated list of restricted words"
    required: true
    default: ''
runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Setup Python dependencies
      shell: bash
      run: |
        pip install urllib3
    - name: Run the checker script
      shell: bash
      env:
        INPUT_RESTRICTED_WORDS: ${{ inputs.restricted-words }}
      run: |
        python ${{ github.action_path }}/main.py
